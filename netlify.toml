# Netlify Configuration for SaaS Platform Website
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # Build command
  command = "npm run build"
  
  # Output directory (where the build files are generated)
  publish = "dist"
  
  # Node.js version
  node_version = "18.17.1"

[build.environment]
  # Environment variables for build
  NODE_ENV = "production"
  # Ensure build tools like Vite (in devDependencies) are installed on Netlify
  NPM_FLAGS = "--include=dev"

# Development context (for deploy previews)
[context.deploy-preview]
  command = "npm run build"

# Redirects for Single Page Application (SPA) routing
[[redirects]]
  # All requests to non-existent files should go to index.html
  from = "/*"
  to = "/index.html"
  status = 200

# HTTP headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache headers for assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache headers for index.html (minimal caching)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
